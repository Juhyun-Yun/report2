    setIsStarted(false);
  };

  const handleChangeStudent = () => {
    if (!window.confirm('다른 학생으로 다시 시작할까요? 현재 작성한 내용은 그대로 유지됩니다.')) return;
    setSelectedStudent(null);
    setIsStarted(false);
    setShowLearning(false);
  };

  const teammates = selectedStudent && selectedStudent.team
    ? students.filter(s => s.team === selectedStudent.team && s.name !== selectedStudent.name)
    : [];
  const reportMode = selectedStudent && selectedStudent.team ? '팀' : '개인';

  // 본문 안의 모든 데이터(그래프) 블록을 PNG로 캡처해 Drive에 업로드.
  // 시트에는 =IMAGE() 수식으로 직접 보이도록 file ID 목록을 반환.
  const captureAndUploadGraphs = async (baseFilename) => {
    if (!window.html2canvas) return [];
    const targets = Array.from(document.querySelectorAll('.data-graph-capture'));
    const ids = [];
    for (let i = 0; i < targets.length; i++) {
      try {
        const canvas = await window.html2canvas(targets[i], {
          scale: 2,
          backgroundColor: '#ffffff',
          useCORS: true,
        });
        const url = canvas.toDataURL('image/png');
        const idx = url.indexOf(',');
        if (idx < 0) continue;
        const base64 = url.substring(idx + 1);
        const res = await sheetApi.postJson({
          action: 'uploadImage',
          mimeType: 'image/png',
          dataBase64: base64,
          filename: `${baseFilename}_graph${i + 1}`,
        });
        if (res && res.id) ids.push(res.id);
      } catch (err) {
        console.warn('그래프 캡처 실패', err);
      }
    }
    return ids;
  };

  const handleSubmitToSheet = async () => {
    if (!selectedStudent) {
      alert('학생을 먼저 선택해 주세요.');
      return;
    }
    if (!sheetApi.enabled()) {
      alert('연결된 시트가 없습니다. 선생님 설정에서 웹앱 URL을 입력해 주세요.');
      return;
    }
    if (!window.confirm('선생님께 보고서를 제출할까요?\n작성 중인 내용을 PDF로 만들어 Google Drive에 올립니다.')) return;

    setSubmitting(true);
    setSubmitMsg(null);
    try {
      setSubmitMsg({ kind: 'ok', text: '보고서 PDF를 만드는 중…' });
      const doc = await buildPdfDoc();

      // jsPDF 결과를 base64로 추출
      // jsPDF 버전에 따라 "data:application/pdf;filename=...;base64,..." 형태가 올 수 있어
      // ";base64," 기준으로 안전하게 잘라낸다.
      const dataUri = doc.output('datauristring') || '';
      const base64Marker = ';base64,';
      const markerIdx = dataUri.indexOf(base64Marker);
      if (markerIdx < 0) throw new Error('PDF 데이터 변환 실패');
      const dataBase64 = dataUri.substring(markerIdx + base64Marker.length);

      const safeTitle = (cover.title || '제목없음').replace(/[\\/:*?"<>|]/g, '_').slice(0, 30) || '제목없음';
      const dateStr = new Date().toISOString().slice(0, 10);
      const teamPart = selectedStudent.team ? `_${selectedStudent.team}` : '';
      const filename = `${dateStr}_${selectedStudent.name}${teamPart}_${safeTitle}`;

      // 업로드할 PDF 크기 (대략) 표시
      const approxKB = Math.round((dataBase64.length * 3) / 4 / 1024);
      const sizeText = approxKB >= 1024 ? `${(approxKB/1024).toFixed(1)} MB` : `${approxKB} KB`;
      setSubmitMsg({ kind: 'ok', text: `Google Drive에 업로드 중… (약 ${sizeText})` });

      const uploadResult = await sheetApi.postJson({
        action: 'uploadImage',
        mimeType: 'application/pdf',
        dataBase64,
        filename,
      });

      // 데이터(그래프) 블록을 캡처해서 별도 이미지로 업로드 → 시트에 IMAGE() 수식으로 표시
      setSubmitMsg({ kind: 'ok', text: '그래프 이미지 만드는 중…' });
      const graphImageIds = await captureAndUploadGraphs(filename);

      setSubmitMsg({ kind: 'ok', text: '시트에 기록 중…' });
      await sheetApi.saveReport({
        studentId: selectedStudent.id || '',
        studentName: selectedStudent.name,
        team: selectedStudent.team || '',
        mode: reportMode,
        activityType: (cover.activityTypes || []).join(', '),
        title: cover.title || '',
        content: summarizeBlocksForSheet(blocks),
        reportUrl: uploadResult.url,
        graphImageIds,
      });
      setSubmitMsg({ kind: 'ok', text: '✅ 선생님께 보고서 제출 완료!' });
      setTimeout(() => setSubmitMsg(null), 4000);
    } catch (err) {
      console.error('submit failed', err);
      setSubmitMsg({ kind: 'err', text: '제출 실패: ' + (err.message || String(err)) });
    } finally {
      setSubmitting(false);
    }
  };

  useEffect(() => {
    Promise.all([
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
    ]).catch(err => console.error('Failed to load PDF libs', err));
  }, []);

  // 활동 유형 토글 — 관찰/측정/분류(기초)는 동시에 여러 개 선택 가능
  const handleToggleActivity = (type) => {
    setCover(prev => {
      const cur = Array.isArray(prev.activityTypes) ? prev.activityTypes : [];
      const next = cur.includes(type) ? cur.filter(t => t !== type) : cur.concat(type);
      return { ...prev, activityTypes: next };
    });
  };

  // 학습 화면에 보여줄 모든 탐구활동 (기초 탐구)
  const ALL_ACTIVITIES = ['관찰', '측정', '분류'];

  // 표지에서 활동을 선택하고 "시작하기" → 바로 보고서 작성으로
  const handleStartFromCover = () => {
    const types = Array.isArray(cover.activityTypes) ? cover.activityTypes : [];
    if (types.length === 0) {
      alert('탐구 활동을 하나 이상 선택해 주세요.');
      return;
    }
    setIsStarted(true);
    requestCameraPermission(); // 돋보기 관찰을 위해 카메라 권한을 미리 한 번만 요청
  };

  // 돋보기 관찰용 카메라 권한을 시작 시 한 번만 받아 둔다. (중간에 다시 묻지 않도록)
  const requestCameraPermission = async () => {
    try {
      await cameraManager.getStream();
    } catch (err) {
      console.warn('카메라 권한 요청 보류:', err && err.name);
    }
  };

  // [NEW] Go Home function
  const goHome = () => {
    setIsStarted(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const addBlock = (type) => {
    const newId = Date.now();
    let title = "";
    let color = "blue";
    let placeholder = "";
    
    switch(type) {
      case 'text': title = "📝 추가 노트"; color = "blue"; break;
      case 'plan': title = "📋 탐구 계획 & 준비물"; color = "orange"; break;
      case 'data': title = "📊 데이터 분석"; color = "green"; break;
      case 'timer': title = "⏱️ 스톱워치"; color = "red"; break;
      case 'draw': title = "🎨 관찰 스케치"; color = "yellow"; break;
      case 'magnifier': title = "🔍 돋보기 관찰"; color = "pink"; break;
      case 'conclusion':
        title = "🏁 결론 및 더 알고 싶은 점"; 
        color = "purple"; 
        placeholder = "탐구 결과는 어땠나요? 예상과 같았나요?\n더 궁금해진 점이 있다면 적어보세요.";
        type = 'text'; 
        break;
      default: title = "새로운 도구";
    }

    setBlocks([...blocks, { id: newId, type, title, color, isDeletable: true, content: null, placeholder }]);
    setIsMenuOpen(false); // Close menu after adding
    
    setTimeout(() => {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }, 100);
  };

  const removeBlock = (id) => {
    setBlocks(blocks.filter(b => b.id !== id));
  };

  const updateBlockTitle = (id, newTitle) => {
    setBlocks(blocks.map(b => b.id === id ? { ...b, title: newTitle } : b));
  };

  const updateBlockContent = (id, newContent) => {
    setBlocks(blocks.map(b => b.id === id ? { ...b, content: newContent } : b));
  };

  const handleStartEdit = (blockId, imageIndex, imageSrc) => {
    setEditingState({ blockId, imageIndex, imageSrc });
  };

  const handleSaveEdit = (newSrc) => {
    if (editingState) {
      const { blockId, imageIndex } = editingState;
      const block = blocks.find(b => b.id === blockId);
      if (block && block.type === 'photo') {
        const rawContent = block.content || [];
        const normalized = rawContent.map(item => typeof item === 'string' ? { src: item, caption: '' } : item);
        
        normalized[imageIndex].src = newSrc;
        updateBlockContent(blockId, normalized);
      }
      setEditingState(null);
    }
  };

  const renderModule = (block) => {
    const commonProps = {
      content: block.content,
      onUpdate: (newContent) => updateBlockContent(block.id, newContent),
      placeholder: block.placeholder
    };

    switch (block.type) {
      case 'text': return <TextModule {...commonProps} />;
      case 'plan': return <PlanModule {...commonProps} />; 
      case 'data': return <DataModule {...commonProps} />;
      case 'timer': return <TimerModule />; 
      case 'draw': return <DrawingModule {...commonProps} />;
      case 'magnifier': return <MagnifierModule {...commonProps} />;
      default: return null;
    }
  };

  const handleSaveFile = () => {
    const dataToSave = JSON.stringify({ blocks, cover }, null, 2); 
    const blob = new Blob([dataToSave], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    
    const link = document.createElement('a');
    link.href = url;
    const dateStr = new Date().toISOString().slice(0,10);
    link.download = `탐구프로젝트_${dateStr}.json`;
    link.click();
    
    URL.revokeObjectURL(url);
  };

  const handleLoadFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const loadedData = JSON.parse(event.target.result);
        
        if (loadedData.blocks) {
            setBlocks(loadedData.blocks);
            
            if (loadedData.cover) {
              setCover(loadedData.cover);
            } else if (loadedData.period) {
              setCover(prev => ({ ...prev, period: loadedData.period }));
            }
        } else {
            setBlocks(loadedData); 
        }
        setIsStarted(true); 
        alert("성공적으로 불러왔어요! 이어쓰기를 시작해볼까요?");
      } catch (err) {
        console.error("Load Error", err);
        alert("파일을 불러오는데 실패했어요. 올바른 파일인지 확인해주세요.");
      }
    };
    reader.readAsText(file);
    e.target.value = null; 
  };

  const handleReset = () => {
    if (window.confirm("작성 중인 내용이 모두 사라집니다. 정말 초기화하시겠습니까?")) {
      localStorage.removeItem('sl_blocks');
      localStorage.removeItem('sl_cover');
      localStorage.removeItem('sl_isStarted');
      window.location.reload();
    }
  };

  // 보고서 전체를 PDF 문서로 빌드해서 jsPDF doc 객체를 반환.
  // 다운로드 / Drive 업로드 양쪽에서 공통으로 사용.
  const buildPdfDoc = async () => {
    window.scrollTo(0, 0);
    const style = document.createElement('style');
    style.innerHTML = `* { transition: none !important; }`;
    document.head.appendChild(style);

    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4', compress: true });
      const pageWidth = 210; 
      const pageHeight = 297; 
      const margin = 10;
      const contentWidth = pageWidth - (margin * 2);
      
      let cursorY = margin;

      const headerEl = document.getElementById('report-header');
      if (headerEl) {
        const infoGrid = headerEl.querySelector('.cover-info-grid');
        const originalInfoGridDisplay = infoGrid ? infoGrid.style.display : '';
        const originalHeaderClasses = headerEl.className; 

        if (infoGrid) {
           infoGrid.classList.remove('hidden', 'opacity-0', 'h-0', 'overflow-hidden');
           infoGrid.classList.add('opacity-100', 'h-auto', 'mt-8', 'mb-8'); 
        }

        // Apply static styles for PDF capture
        headerEl.className = 'bg-white border-4 border-indigo-200 shadow-xl overflow-hidden relative group flex flex-col items-center justify-center p-10 mb-8';
        
        const tools = document.querySelectorAll('.tool-btn');
        tools.forEach(el => el.style.display = 'none');
        
        // Convert Textareas/Inputs to Divs
        const headerTextareas = headerEl.querySelectorAll('textarea');
        const headerReplacements = [];
        headerTextareas.forEach(textarea => {
          const div = document.createElement('div');
          const style = window.getComputedStyle(textarea);
          div.style.width = style.width;
          div.style.height = 'auto'; 
          div.style.minHeight = style.minHeight; 
          div.style.padding = style.padding;
          div.style.fontSize = style.fontSize;
          div.style.lineHeight = style.lineHeight;
          div.style.fontFamily = style.fontFamily;
          div.style.fontWeight = style.fontWeight;
          div.style.textAlign = style.textAlign;
          div.style.whiteSpace = 'pre-wrap'; 
          div.style.wordBreak = 'break-word'; 
          div.style.border = 'none'; 
          div.style.background = 'transparent';
          div.innerText = textarea.value; 
          
          textarea.parentNode.insertBefore(div, textarea);
          textarea.style.display = 'none'; 
          headerReplacements.push({ original: textarea, replacement: div });
        });

        const headerInputs = headerEl.querySelectorAll('input');
        const inputReplacements = [];
        headerInputs.forEach(input => {
           const div = document.createElement('div');
           const style = window.getComputedStyle(input);
           div.style.width = style.width;
           div.style.fontSize = style.fontSize;
           div.style.fontFamily = style.fontFamily;
           div.style.fontWeight = style.fontWeight;
           div.style.textAlign = 'left'; 
           div.innerText = input.value;
           
           input.parentNode.insertBefore(div, input);
           input.style.display = 'none';
           inputReplacements.push({ original: input, replacement: div });
        });
        
        // [FIX] Wait for layout to settle (text reflow)
        await new Promise(r => setTimeout(r, 100));

        const canvas = await window.html2canvas(headerEl, {
            scale: 1.5,
            backgroundColor: "#ffffff",
            scrollY: 0, // [FIX] Force top scroll context
            useCORS: true
        });
        const imgHeight = (canvas.height * contentWidth) / canvas.width;

        // Restore Header
        headerReplacements.forEach(pair => {
          pair.original.style.display = '';
          pair.replacement.remove();
        });
        inputReplacements.forEach(pair => {
          pair.original.style.display = '';
          pair.replacement.remove();
        });

        if (infoGrid) {
           infoGrid.classList.add('hidden', 'opacity-0', 'h-0', 'overflow-hidden');
           infoGrid.classList.remove('opacity-100', 'h-auto', 'mt-8', 'mb-8');
        }
        headerEl.className = originalHeaderClasses;
        headerEl.style.minHeight = '';

        doc.addImage(canvas.toDataURL('image/jpeg', 0.82), 'JPEG', margin, cursorY, contentWidth, imgHeight, undefined, 'FAST');
        
        cursorY += imgHeight + 10; 
      }

      const cards = document.querySelectorAll('.report-card');
      
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        
        const tools = card.querySelectorAll('.tool-btn');
        tools.forEach(el => el.style.display = 'none');
        const inputs = card.querySelectorAll('input, textarea');
        inputs.forEach(input => input.style.background = 'transparent');

        const originalTextareas = []; 
        const textareas = card.querySelectorAll('textarea');
        
        textareas.forEach(textarea => {
          const div = document.createElement('div');
          const style = window.getComputedStyle(textarea);
          div.style.width = style.width;
          div.style.height = 'auto'; 
          div.style.minHeight = style.minHeight; 
          div.style.padding = style.padding;
          div.style.fontSize = style.fontSize;
          div.style.lineHeight = style.lineHeight;
          div.style.fontFamily = style.fontFamily;
          div.style.whiteSpace = 'pre-wrap'; 
          div.style.wordBreak = 'break-word'; 
          div.style.border = style.border;
          div.style.borderRadius = style.borderRadius;
          div.style.backgroundColor = style.backgroundColor;
          div.style.color = style.color;
          div.innerText = textarea.value; 
          div.style.textAlign = style.textAlign; 
          
          textarea.parentNode.insertBefore(div, textarea);
          textarea.style.display = 'none'; 
          originalTextareas.push({ original: textarea, replacement: div });
        });

        // [FIX] Wait for layout to settle
        await new Promise(r => setTimeout(r, 50));

        const canvas = await window.html2canvas(card, {
            scale: 1.5,
            backgroundColor: "#ffffff",
            scrollY: 0,
            useCORS: true
        });
        const imgHeight = (canvas.height * contentWidth) / canvas.width;

        // [FIX] Better pagination logic with safe buffer (20mm) to prevent bottom clipping
        if (cursorY + imgHeight > pageHeight - margin - 10) {
          doc.addPage();
          cursorY = margin;
        }

        doc.addImage(canvas.toDataURL('image/jpeg', 0.82), 'JPEG', margin, cursorY, contentWidth, imgHeight, undefined, 'FAST');
        cursorY += imgHeight + 5; 

        originalTextareas.forEach(pair => {
          pair.original.style.display = '';
          pair.replacement.remove();
        });
      }

      const allTools = document.querySelectorAll('.tool-btn');
      allTools.forEach(el => el.style.display = '');

      return doc;
    } finally {
      // 캡처용 스타일 / 툴 표시 정리
      if (document.head.contains(style)) {
        document.head.removeChild(style);
      }
      const allTools = document.querySelectorAll('.tool-btn');
      allTools.forEach(el => el.style.display = '');
    }
  };

  const handleDownloadPDF = async () => {
    setIsGenerating(true);
    try {
      const doc = await buildPdfDoc();
      const dateStr = new Date().toISOString().slice(0, 10);
      doc.save(`탐구일지_${dateStr}.pdf`);
    } catch (error) {
      console.error('PDF generation failed', error);
      alert('PDF 생성 중 오류 발생. 인쇄 메뉴를 엽니다.');
      window.print();
    } finally {
      setIsGenerating(false);
    }
  };

  // 선생님 설정 진입 전 비밀번호 확인 화면
  if (showPasscode) {
    return (
      <PasscodeScreen
        onUnlock={() => { setShowPasscode(false); setShowSettings(true); }}
        onCancel={() => setShowPasscode(false)}
      />
    );
  }

  // 설정(배포 주소 입력) 화면 — 비밀번호 통과 후에만 표시
  if (showSettings) {
    return (
      <TeacherSetupScreen
        initialUrl={apiUrl}
        canCancel={true}
        onSave={handleSaveApiUrl}
        onCancel={() => setShowSettings(false)}
      />
    );
  }

  if (!selectedStudent) {
    return (
      <StudentSelectionScreen
        configured={!!apiUrl}
        students={students}
        loading={rosterLoading}
        error={rosterError}
        onRetry={loadRoster}
        onSelect={handleSelectStudent}
        onOpenSettings={ENTERED_BY_LINK ? null : () => setShowPasscode(true)}
      />
    );
  }

  return (
    <div className={`bg-slate-100 font-sans relative ${isStarted ? 'min-h-screen pb-32 sm:pb-40' : 'h-screen overflow-hidden'}`}>
      {/* 1. Learning View (Overlay) - 표지의 "학습하기" 버튼으로 열리는 선택적 학습 화면 */}
      {showLearning && (
        <LearningView
          activities={ALL_ACTIVITIES}
          onStartReport={() => setShowLearning(false)}
          onBack={() => setShowLearning(false)}
        />
      )}

      {/* 2. Top Header - Hidden on Landing Page */}
      {isStarted && (
        <header className="bg-white border-b-2 border-slate-200 sticky top-0 z-50 shadow-sm animate-fade-in-down">
          <div className="max-w-6xl mx-auto px-2 sm:px-4 py-2 sm:py-3 flex flex-nowrap justify-between items-center gap-2">
            <div className="flex items-center gap-2 sm:gap-3 min-w-0 flex-shrink">
              <div className="bg-indigo-500 text-white p-1.5 sm:p-2 rounded-xl shadow-md rotate-3 flex-shrink-0">
                <Type size={18} className="sm:w-5 sm:h-5" strokeWidth={3} />
              </div>
              <div className="flex flex-col min-w-0">
                <h1 className="text-base sm:text-lg md:text-xl font-black text-indigo-900 tracking-tight whitespace-nowrap leading-tight">
                  나의 과학탐구활동 보고서<span className="hidden md:inline text-xs md:text-sm font-bold text-indigo-400 ml-1.5">3-4학년용 🌱</span>
                </h1>
                <div className="flex items-center gap-1.5 mt-0.5 whitespace-nowrap">
                  <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] sm:text-xs font-bold border flex-shrink-0 ${
                    reportMode === '팀'
                      ? 'bg-emerald-50 text-emerald-700 border-emerald-200'
                      : 'bg-slate-100 text-slate-600 border-slate-200'
                  }`}>
                    {reportMode === '팀'
                      ? <><Users size={10} /> {selectedStudent.team}</>
                      : <><User size={10} /> 개인</>}
                  </span>
                  <span className="text-xs sm:text-sm font-bold text-slate-700 truncate">{selectedStudent.name}</span>
                  <button
                    onClick={handleChangeStudent}
                    className="ml-0.5 text-[10px] text-slate-400 hover:text-indigo-500 font-bold underline-offset-2 hover:underline flex-shrink-0"
                    title="다른 학생으로 변경"
                  >
                    변경
                  </button>
                </div>
              </div>
            </div>
            <div className="flex flex-nowrap gap-1 sm:gap-1.5 flex-shrink-0 whitespace-nowrap">
              <input type="file" ref={fileInputRef} onChange={handleLoadFile} accept=".json" className="hidden" />

              <button
                onClick={goHome}
                className="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-2.5 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-bold bg-slate-100 text-slate-600 hover:bg-indigo-100 hover:text-indigo-600 transition-colors shadow-sm whitespace-nowrap flex-shrink-0"
                title="처음 화면으로"
              >
                <Home size={15} className="sm:w-4 sm:h-4" /> <span className="hidden md:inline">홈</span>
              </button>

              <button
                onClick={handleReset}
                className="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-2.5 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-bold bg-slate-100 text-slate-500 hover:bg-red-100 hover:text-red-500 transition-colors shadow-sm whitespace-nowrap flex-shrink-0"
                title="초기화"
              >
                <RefreshCcw size={15} className="sm:w-4 sm:h-4" /> <span className="hidden md:inline">초기화</span>
              </button>

              <button
                onClick={() => fileInputRef.current.click()}
                className="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-2.5 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors shadow-sm whitespace-nowrap flex-shrink-0"
                title="파일 불러오기"
              >
                <FolderOpen size={15} className="sm:w-4 sm:h-4" /> <span className="hidden md:inline">열기</span>
              </button>

              <button
                onClick={handleSaveFile}
                className="flex items-center gap-1 sm:gap-1.5 px-2 sm:px-2.5 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors shadow-sm whitespace-nowrap flex-shrink-0"
                title="파일로 저장하기"
              >
                <FileDown size={15} className="sm:w-4 sm:h-4" /> <span className="hidden md:inline">저장</span>
              </button>

              <button
                onClick={handleSubmitToSheet}
                disabled={submitting || !sheetApi.enabled()}
                className={`flex items-center gap-1 sm:gap-1.5 px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-bold transition-all shadow-md active:scale-95 whitespace-nowrap flex-shrink-0 ${
                  submitting || !sheetApi.enabled()
                    ? 'bg-slate-200 text-slate-500 cursor-not-allowed'
                    : 'bg-emerald-600 text-white hover:bg-emerald-700 hover:shadow-lg'
                }`}
                title={!sheetApi.enabled() ? '연결된 시트가 없습니다 (선생님 설정 필요)' : '선생님 시트에 제출'}
              >
                {submitting ? <Loader2 size={15} className="animate-spin" /> : <Save size={15} className="sm:w-4 sm:h-4" />}
                <span className="hidden md:inline">
                  {submitting ? '제출 중...' : '제출'}
                </span>
              </button>

              <button
                onClick={handleDownloadPDF}
                disabled={isGenerating}
                className={`flex items-center gap-1 sm:gap-1.5 px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-bold transition-all shadow-md active:scale-95 whitespace-nowrap flex-shrink-0 ${
                  isGenerating ? 'bg-slate-200 text-slate-500 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-lg'
                }`}
              >
                {isGenerating ? <Loader2 size={15} className="animate-spin" /> : <Download size={15} className="sm:w-4 sm:h-4" />}
                <span className="hidden md:inline">
                  {isGenerating ? '변환 중...' : 'PDF'}
                </span>
              </button>
            </div>
          </div>
        </header>
      )}

      {/* Submit progress / result banner */}
      {submitMsg && (
        <div className={`fixed top-3 left-1/2 -translate-x-1/2 z-[60] px-4 py-2 rounded-xl shadow-lg text-xs sm:text-sm font-bold border ${
          submitMsg.kind === 'ok'
            ? 'bg-emerald-50 border-emerald-200 text-emerald-700'
            : 'bg-red-50 border-red-200 text-red-700'
        } animate-fade-in-down flex items-center gap-2`}>
          {submitting && <Loader2 size={14} className="animate-spin" />}
          <span>{submitMsg.text}</span>
          {!submitting && (
            <button onClick={() => setSubmitMsg(null)} className="ml-1 opacity-50 hover:opacity-100">
              <X size={14} />
            </button>
          )}
        </div>
      )}

      {/* Team members hint - shown only on landing (cover) when in team mode */}
      {!isStarted && reportMode === '팀' && teammates.length > 0 && (
        <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-[110] bg-white/95 backdrop-blur-sm border-2 border-emerald-200 rounded-2xl px-4 py-2 shadow-lg max-w-md text-center">
          <div className="text-[10px] font-bold text-emerald-600 mb-0.5 flex items-center justify-center gap-1">
            <Users size={12} /> 우리 팀 ({selectedStudent.team})
          </div>
          <div className="text-xs text-slate-700 font-bold">
            {[selectedStudent.name, ...teammates.map(s => s.name)].join(' · ')}
          </div>
        </div>
      )}

      {/* 3. Main Content */}
      <main className="max-w-3xl mx-auto px-4 sm:px-6 py-6 sm:py-10 bg-slate-100 relative min-h-screen">
        
        {/* Cover Section (Landing) */}
        <CoverSection
          data={cover}
          onUpdate={setCover}
          isStarted={isStarted}
          onToggleActivity={handleToggleActivity}
          onStart={handleStartFromCover}
          onLearn={() => setShowLearning(true)}
        />

        {/* Report Content - Visible only after start */}
        <div 
          className={`space-y-4 sm:space-y-8 transition-opacity duration-1000 ${isStarted ? 'opacity-100' : 'opacity-0 pointer-events-none h-0 overflow-hidden'}`} 
          id="report-content"
        > 
          {blocks.map((block) => (
            <Card 
              key={block.id}
              id={block.id}
              title={block.title} 
              color={block.color}
              isDeletable={block.isDeletable}
              onDelete={() => removeBlock(block.id)}
              onTitleChange={block.type === 'activitySelector' ? null : (newTitle) => updateBlockTitle(block.id, newTitle)}
            >
              {renderModule(block)}
            </Card>
          ))}

           {/* Add Block Hint */}
           {isStarted && blocks.length < 3 && (
             <div className="text-center text-slate-400 text-sm py-10 animate-pulse">
               👇 오른쪽 아래 (+) 버튼을 눌러 도구를 추가해보세요!
             </div>
           )}
        </div>
        
        <div className="h-20"></div>
      </main>

      {/* 4. Floating Toolbar - Visible only after start */}
      {!isGenerating && isStarted && (
        <div className="fixed bottom-6 right-6 flex flex-col-reverse items-end gap-3 z-40">
          
          {/* Main FAB (Menu Toggle) */}
          <button 
            onClick={() => setIsMenuOpen(!isMenuOpen)}
            className={`w-14 h-14 sm:w-16 sm:h-16 bg-indigo-600 text-white rounded-full shadow-xl flex items-center justify-center transition-all duration-300 hover:bg-indigo-700 active:scale-95 ${isMenuOpen ? 'rotate-45' : 'rotate-0'}`}
          >
            <Plus size={32} />
          </button>

          {/* Expanded Menu Items */}
          <div className={`flex flex-col gap-3 transition-all duration-300 origin-bottom ${isMenuOpen ? 'opacity-100 scale-100 translate-y-0' : 'opacity-0 scale-50 translate-y-10 pointer-events-none'}`}>
            <ToolButton icon={FileText} label="결론" color="bg-purple-100 text-purple-700 hover:bg-purple-200 ring-purple-200" onClick={() => addBlock('conclusion')} />
            <ToolButton icon={Brush} label="그리기" color="bg-yellow-100 text-yellow-700 hover:bg-yellow-200 ring-yellow-200" onClick={() => addBlock('draw')} />
            <ToolButton icon={Timer} label="타이머" color="bg-red-100 text-red-700 hover:bg-red-200 ring-red-200" onClick={() => addBlock('timer')} />
            <ToolButton icon={BarChart2} label="데이터" color="bg-green-100 text-green-700 hover:bg-green-200 ring-green-200" onClick={() => addBlock('data')} />
            <ToolButton icon={ZoomIn} label="돋보기" color="bg-pink-100 text-pink-700 hover:bg-pink-200 ring-pink-200" onClick={() => addBlock('magnifier')} />
            <ToolButton icon={Pencil} label="글쓰기" color="bg-blue-100 text-blue-700 hover:bg-blue-200 ring-blue-200" onClick={() => addBlock('text')} />
          </div>
        </div>
      )}

      {/* Photo Editor Modal */}
      {editingState && (
        <PhotoEditor
          imageSrc={editingState.imageSrc}
          onSave={handleSaveEdit}
          onCancel={() => setEditingState(null)}
        />
      )}
    </div>
  );
};

const ToolButton = ({ icon: Icon, label, onClick, color }) => (
  <button 
    onClick={onClick}
    className={`flex items-center justify-between w-auto gap-3 px-4 py-2 rounded-xl shadow-lg transition-all transform hover:scale-105 active:scale-95 bg-white border border-slate-100`}
  >
    <span className="text-xs font-bold text-slate-600 whitespace-nowrap">{label}</span>
    <div className={`p-2 rounded-lg ${color}`}>
      <Icon size={20} strokeWidth={2.5} />
    </div>
  </button>
);

createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
