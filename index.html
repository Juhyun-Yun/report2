// ----------------------------------------------------------------------
// 1. Utilities
// ----------------------------------------------------------------------
const loadScript = (src) => {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) {
      resolve();
      return;
    }
    const script = document.createElement('script');
    script.src = src;
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
};

const fileToBase64 = (file) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = (error) => reject(error);
  });
};

// ----------------------------------------------------------------------
// 1.2. 공유 카메라 관리 (돋보기 관찰용)
//  - 권한은 보고서 시작 시 한 번만 요청하고, 받은 스트림을 캐시해 둠.
//  - 돋보기 모듈은 이 스트림을 재사용하므로 중간에 권한을 다시 묻지 않음.
//  - (스트림은 세션 동안 살아 있다가 페이지를 닫거나 새로고침하면 정리됨)
// ----------------------------------------------------------------------
const cameraManager = {
  stream: null,
  getStream: async () => {
    // 이미 받아 둔 살아있는 스트림이 있으면 그대로 재사용 → 권한 재요청 방지
    if (cameraManager.stream && cameraManager.stream.active) {
      return cameraManager.stream;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error('이 기기에서는 카메라를 사용할 수 없어요.');
    }
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    } catch (err) {
      // 후면 카메라가 없으면 일반 카메라로 폴백
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
    }
    cameraManager.stream = stream;
    return stream;
  },
};

// ----------------------------------------------------------------------
// 1.5. Google Sheets / Apps Script 연동
// ----------------------------------------------------------------------
// ※ 보안: 특정 선생님의 시트 주소는 코드(공개 저장소)에 넣지 않습니다.
//   각 선생님이 자신의 시트 사본을 만들어 배포한 뒤,
//   - 앱의 "선생님 설정"에서 자신의 주소를 입력하거나
//   - 학생용 입장 링크를 통해 접속합니다.
//   주소는 그 선생님의 브라우저와 본인이 만든 링크에만 존재합니다.
// ── 선생님 설정 잠금 비밀번호 ──────────────────────────────────────
// 학생이 [선생님 설정]에 들어가지 못하도록 막는 비밀번호입니다.
// ★ 배포(공유) 전에 아래 값을 선생님만 아는 값으로 바꾸세요. (숫자/문자 모두 가능)
const TEACHER_PASSCODE = '1234';

const API_URL_STORAGE_KEY = 'sl_apiUrl';

const isValidApiUrl = (u) => typeof u === 'string' && /^https:\/\/script\.google\.com\//.test(u.trim());

// 학생용 입장 링크에서 시트 주소를 꺼낸다. (#c=... 형태)
const readLinkApiUrl = () => {
  try {
    const hash = window.location.hash || '';
    const m = hash.match(/[#&]c=([^&]+)/);
    if (m) {
      const v = decodeURIComponent(m[1]).trim();
      if (isValidApiUrl(v)) return v;
    }
    // (구버전) ?api= 형태도 호환
    const q = (new URLSearchParams(window.location.search).get('api') || '').trim();
    if (isValidApiUrl(q)) return q;
  } catch (e) {}
  return '';
};

// 이번 접속이 "학생용 입장 링크"로 들어온 것인지 여부.
//  - 학생용 링크로 들어왔으면 선생님 설정 버튼/패널을 아예 보여주지 않는다.
//  - 주소가 약간 어긋나 있어도 링크 표식(#c= / ?api=)만 있으면 학생으로 본다.
const ENTERED_BY_LINK = (() => {
  try {
    if (/[#&]c=/.test(window.location.hash || '')) return true;
    if (new URLSearchParams(window.location.search).has('api')) return true;
  } catch (e) {}
  return false;
})();

// 우선순위: 입장 링크(#c=) → 저장값(localStorage) → 없음('')
const resolveApiUrl = () => {
  try {
    const fromLink = readLinkApiUrl();
    if (fromLink) {
      try { localStorage.setItem(API_URL_STORAGE_KEY, fromLink); } catch (e) {}
      return fromLink;
    }
    const saved = (localStorage.getItem(API_URL_STORAGE_KEY) || '').trim();
    if (isValidApiUrl(saved)) return saved;
  } catch (e) {}
  return '';
};

// 앱 주소(쿼리·해시 제외) + #c=주소 → 학생용 입장 링크를 만든다.
const buildStudentLink = (apiUrl) => {
  const base = window.location.origin + window.location.pathname;
  return base + '#c=' + encodeURIComponent((apiUrl || '').trim());
};

// 모듈 전역에서 쓰는 현재 API URL (설정 화면에서 갱신 가능)
let SHEET_API_URL = resolveApiUrl();
const setSheetApiUrl = (url) => {
  SHEET_API_URL = (url || '').trim();
  try {
    if (SHEET_API_URL) localStorage.setItem(API_URL_STORAGE_KEY, SHEET_API_URL);
    else localStorage.removeItem(API_URL_STORAGE_KEY);
  } catch (e) {}
};

// 명단 조회: 스크립트 태그를 동적으로 만들어 콜백으로 데이터를 받는다.
//  (정적 호스팅에서 다른 계정의 시트 주소로도 명단을 안전하게 읽기 위함)
const requestRosterByScript = (apiUrl) => new Promise((resolve, reject) => {
  const cbName = '__roster_cb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
  let script = null;
  const timer = setTimeout(() => { cleanup(); reject(new Error('명단 응답 시간 초과')); }, 20000);
  const cleanup = () => {
    clearTimeout(timer);
    try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
    if (script && script.parentNode) script.parentNode.removeChild(script);
  };
  window[cbName] = (data) => {
    cleanup();
    if (!data || !data.ok) reject(new Error((data && data.error) || '명단 불러오기 실패'));
    else resolve(data.students || []);
  };
  const sep = apiUrl.indexOf('?') >= 0 ? '&' : '?';
  script = document.createElement('script');
  script.src = apiUrl + sep + 'action=getRoster&cb=' + cbName;
  script.onerror = () => { cleanup(); reject(new Error('명단을 불러오지 못했어요. 주소와 배포 권한을 확인하세요.')); };
  document.body.appendChild(script);
});

const sheetApi = {
  enabled: () => isValidApiUrl(SHEET_API_URL),

  fetchRoster: async () => {
    if (!sheetApi.enabled()) throw new Error('API_URL 미설정');
    return await requestRosterByScript(SHEET_API_URL);
  },

  // 저장 요청: 본문에 내용을 담아 보낸다. (응답으로 성공 여부를 받음)
  postJson: async (payload, opts = {}) => {
    if (!sheetApi.enabled()) throw new Error('API_URL 미설정');
    const timeoutMs = opts.timeoutMs || 180000; // 기본 3분
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(SHEET_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload),
        signal: controller.signal,
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '요청 실패');
      return data;
    } catch (err) {
      if (err && err.name === 'AbortError') {
        throw new Error(`서버 응답 시간 초과(${Math.round(timeoutMs/1000)}초). PDF가 너무 클 수 있어요.`);
      }
      throw err;
    } finally {
      clearTimeout(timer);
    }
  },

  saveReport: async (record) => {
    return await sheetApi.postJson({ action: 'saveReport', ...record });
  },
};

// 보고서 블록 → 사람이 읽을 수 있는 텍스트 요약 (시트의 "내용" 칼럼에 저장됨)
// — 학생이 글로 입력한 내용은 가능한 한 모두 보존.
//   선생님이 시트만 봐도 무엇을 적었는지 확인할 수 있도록 함.
const summarizeBlocksForSheet = (blocks) => {
  const lines = [];
  for (const b of blocks) {
    const head = b.title || '(제목 없음)';
    if (b.type === 'text') {
      const c = b.content;
      if (typeof c === 'string' && c.trim()) {
        lines.push(`[${head}]\n${c.trim()}`);
      } else {
        lines.push(`[${head}] (작성 안 함)`);
      }
    } else if (b.type === 'plan') {
      const c = b.content;
      if (c && typeof c === 'object') {
        const parts = [];
        if (c.materials && String(c.materials).trim()) parts.push(`준비물: ${String(c.materials).trim()}`);
        if (c.steps && String(c.steps).trim()) parts.push(`탐구 순서: ${String(c.steps).trim()}`);
        if (parts.length) {
          lines.push(`[${head}]\n${parts.join('\n')}`);
        } else {
          lines.push(`[${head}] (작성 안 함)`);
        }
      } else if (typeof c === 'string' && c.trim()) {
        lines.push(`[${head}]\n${c.trim()}`);
      } else {
        lines.push(`[${head}] (작성 안 함)`);
      }
    } else if (b.type === 'data') {
      const c = b.content || {};
      const arr = Array.isArray(c.data) ? c.data : [];
      if (arr.length) {
        const xUnit = c.xUnit ? ` (${c.xUnit})` : '';
        const yUnit = c.yUnit ? ` (${c.yUnit})` : '';
        const rows = arr.map(it => `  · ${it.label || ''}${xUnit}: ${it.value ?? 0}${yUnit}`).join('\n');
        const kind = c.chartType === 'line' ? '꺾은선그래프' : '막대그래프';
        lines.push(`[${head}] ${kind}\n${rows}`);
      }
    } else if (b.type === 'magnifier') {
      const arr = Array.isArray(b.content) ? b.content : [];
      const captions = arr
        .map(it => (typeof it === 'string' ? '' : (it && it.caption) || ''))
        .filter(Boolean);
      if (arr.length) {
        lines.push(`[${head}] 이미지 ${arr.length}장${captions.length ? '\n설명: ' + captions.join(' / ') : ''}`);
      }
    } else if (b.type === 'draw') {
      // 그림은 PDF/캡처로 보관. 블록이 있다는 사실만 표시.
      const has = b.content && typeof b.content === 'string';
      lines.push(`[${head}] 그림 ${has ? '1장 — 보고서 PDF에서 확인' : '(그리지 않음)'}`);
    }
    // timer 블록은 보고서에 기록할 정보가 없어서 생략
  }
  return lines.join('\n\n');
};

const AutoResizeTextarea = ({ value, onChange, placeholder, className, minHeight = "50px", style = {} }) => {
  const textareaRef = useRef(null);

  useLayoutEffect(() => {
    const ta = textareaRef.current;
    if (!ta) return;
    const measure = () => {
      ta.style.height = 'auto';
      let h = ta.scrollHeight;
      // 값이 비어 있으면 예시(placeholder) 전체가 보이도록 높이를 맞춘다.
      if (!value && placeholder) {
        ta.value = placeholder;
        ta.style.height = 'auto';
        h = Math.max(h, ta.scrollHeight);
        ta.value = '';
        ta.style.height = 'auto';
      }
      ta.style.height = `${h}px`;
    };
    measure();
    window.addEventListener('resize', measure);
    return () => window.removeEventListener('resize', measure);
  }, [value, placeholder]);

  return (
    <textarea
      ref={textareaRef}
      value={value}
      onChange={onChange}
      placeholder={placeholder}
      className={`${className} overflow-hidden resize-none`} 
      style={{ minHeight: minHeight, ...style }}
      rows={1}
    />
  );
};

      <div className="animate-fade-in-up">

};

        '관찰한 친구들의 특징을 먼저 찾아보세요.',

  const list = (Array.isArray(activities) && activities.length) ? activities : ['관찰'];

  // 현재 보고 있는 탭 + 지금까지 살펴본 활동 기록
  const [activeType, setActiveType] = useState(list[0]);
  const [visited, setVisited] = useState(() => new Set([list[0]]));

  // 탭을 누르면 그 활동을 "살펴봄"으로 기록
  useEffect(() => {
    setVisited(prev => {
      if (prev.has(activeType)) return prev;
      const next = new Set(prev);
      next.add(activeType);
      return next;
    });
  }, [activeType]);

  const info = content[activeType] || content['관찰'];
  const Icon = info.icon;

  const visitedCount = list.filter(t => visited.has(t)).length;
  const allVisited = visitedCount >= list.length;

  return (
    // [UPDATED] z-index increased to 200 to overlay CoverSection (z-100)

          {list.map(type => {
            const c = content[type] || content['관찰'];
            const TabIcon = c.icon;
            const isActive = type === activeType;
            const isVisited = visited.has(type);
            return (
              <button
                key={type}
                onClick={() => setActiveType(type)}
                className={`relative flex items-center gap-1.5 px-4 py-2 rounded-full font-title text-sm sm:text-base whitespace-nowrap border-2 transition-all active:scale-95 ${

        <div className="flex-1 flex flex-col md:flex-row items-center justify-center gap-4 sm:gap-8 min-h-0 w-full my-auto">

          {/* Left: Description - Reduced spacing */}
          <div className="flex-1 flex flex-col items-center text-center justify-center overflow-y-auto no-scrollbar max-h-full py-1">
            <div className={`p-3 rounded-full bg-slate-50 mb-3 ${info.color}`}>
              <Icon size={48} strokeWidth={1.5} className="w-10 h-10 sm:w-14 sm:h-14" />
            </div>
            <h2 className="font-title text-2xl sm:text-4xl text-slate-800 mb-3 drop-shadow-sm">{info.title}</h2>

              {info.desc}
            </div>
          </div>

          {/* Right: Tips Box */}
          <div className="flex-1 w-full flex flex-col justify-center max-h-full min-h-0">
             <div className="bg-gradient-to-br from-indigo-50/60 to-slate-50 rounded-3xl p-4 sm:p-6 border-2 border-indigo-100 w-full overflow-y-auto no-scrollbar shadow-sm">
                <h3 className="font-title text-lg sm:text-2xl text-indigo-700 mb-3 flex items-center gap-2 sticky top-0 bg-gradient-to-br from-indigo-50/90 to-slate-50/90 backdrop-blur-sm z-10 pb-1">
                  <BookOpenCheck size={22} className="text-indigo-500" />
                  이렇게 해보세요!
                </h3>
                <ul className="space-y-3">
                  {info.tips.map((tip, idx) => (
                    <li key={idx} className="font-body flex items-start gap-3 text-slate-700 text-sm sm:text-lg leading-relaxed">
                      <span className="font-title flex-shrink-0 w-6 h-6 sm:w-7 sm:h-7 rounded-full bg-indigo-500 text-white text-xs sm:text-sm flex items-center justify-center mt-0.5 shadow-sm">{idx+1}</span>

                  ))}

          </div>
        </div>

        {/* Footer: 선택 화면으로 돌아가기 (학습은 자유롭게 둘러봐도 됨) */}
        <div className="flex-shrink-0 pt-3 flex flex-col items-center gap-1">
          <button
            onClick={onStartReport}
            className="font-title group relative inline-flex items-center justify-center gap-2 px-7 py-3 rounded-full text-xl sm:text-2xl tracking-wide shadow-xl transition-all duration-300 w-full sm:w-auto bg-indigo-600 text-white hover:bg-indigo-700 hover:scale-105"
          >
            <span>{allVisited ? '다 배웠어요! 선택하러 가기' : '선택하러 돌아가기'}</span>
            <ArrowRightCircle size={26} className="group-hover:translate-x-1 transition-transform" />
          </button>
        </div>

      </div>
    </div>
  );
};

// 선생님 설정 화면 — 자신의 Apps Script 웹앱 URL을 입력 (코드에 하드코딩하지 않음)
const TeacherSetupScreen = ({ initialUrl, onSave, onCancel, canCancel }) => {
  const [url, setUrl] = useState(initialUrl || '');
  const [copied, setCopied] = useState(false);
  const trimmed = url.trim();
  const valid = /^https:\/\/script\.google\.com\//.test(trimmed);

  // 저장 여부와 상관없이, 입력한 URL로 만들어지는 "학생용 입장 링크"를 미리 보여준다.
  const studentLink = valid ? buildStudentLink(trimmed) : '';

  const copyStudentLink = async () => {
    if (!studentLink) return;
    try {
      await navigator.clipboard.writeText(studentLink);
    } catch (e) {
      // 클립보드 API가 막힌 환경(구형 브라우저 등) 대비
      try {
        const ta = document.createElement('textarea');
        ta.value = studentLink;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      } catch (e2) {
        window.prompt('아래 학생용 링크를 복사하세요.', studentLink);
        return;
      }
    }
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div className="fixed inset-0 z-[100] bg-gradient-to-br from-slate-100 via-white to-indigo-50 flex flex-col p-4 sm:p-6 overflow-y-auto">
      <div className="max-w-lg mx-auto w-full flex flex-col flex-1 justify-center">
        <div className="bg-white rounded-3xl border-2 border-indigo-300 shadow-xl p-6 sm:p-8">
          <div className="text-center mb-5">
            <div className="inline-flex items-center justify-center bg-indigo-100 rounded-full p-3 mb-2">
              <Settings className="text-indigo-600 w-7 h-7" />
            </div>
            <div className="text-[10px] sm:text-xs font-bold text-indigo-500 tracking-widest uppercase mb-1">
              선생님 설정 · 과학탐구활동 보고서
            </div>
            <h1 className="text-xl sm:text-2xl font-black text-slate-800">
              내 스프레드시트 연결하기
            </h1>
            <p className="text-xs sm:text-sm text-slate-500 mt-1.5 leading-relaxed">
              내 Google 스프레드시트 사본에서 <b>Apps Script 웹앱</b>을 배포한 뒤,
              받은 <b>웹앱 URL</b>을 아래에 붙여넣어 주세요.
            </p>
          </div>

          {/* 안내 박스 */}
          <div className="bg-indigo-50/60 border border-indigo-100 rounded-2xl p-4 mb-4 text-xs sm:text-sm text-slate-600 leading-relaxed">
            <div className="font-bold text-indigo-700 mb-1.5 flex items-center gap-1.5">
              <FileText size={15} /> 처음이신가요?
            </div>
            스프레드시트 사본을 열면 상단 메뉴에 <b>「탐구활동 보고서」</b>가 생겨요.
            <br />① <b>탐구활동 보고서 ▸ 📋 탐구활동 보고서 ▸ 초기 설정</b>으로 탭을 만든 뒤,
            ② <b>확장 프로그램 ▸ Apps Script ▸ 배포 ▸ 새 배포 ▸ 웹 앱</b>(실행: 나 / 액세스: 모든 사용자)으로 배포하고,
            ③ 나온 <b>웹 앱 URL(끝이 /exec)</b>을 아래에 붙여넣으세요.
          </div>

          <label className="flex items-center gap-1.5 text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">
            <Link2 size={14} className="text-indigo-500" /> Apps Script 웹앱 URL
          </label>
          <input
            type="url"
            value={url}
            onChange={(e) => setUrl(e.target.value)}
            placeholder="https://script.google.com/macros/s/.../exec"
            className="w-full bg-white border-2 border-slate-200 rounded-xl px-4 py-3 text-sm font-medium text-slate-800 focus:outline-none focus:border-indigo-400 shadow-sm break-all"
          />
          {!valid && trimmed.length > 0 && (
            <div className="text-[11px] text-red-500 mt-1 font-bold">
              script.google.com 으로 시작하는 웹앱 URL(끝이 /exec)이어야 해요.
            </div>
          )}

          {/* 학생용 링크 미리보기 + 복사 — 이 링크를 그대로 학생에게 공유 */}
          {valid && (
            <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded-2xl p-3">
              <div className="flex items-center gap-1.5 text-[11px] font-bold text-emerald-700 mb-2">
                <Users size={14} className="flex-shrink-0" />
                학생에게 공유할 링크 (이 링크를 받은 학생은 설정 없이 바로 이름 선택)
              </div>
              <div className="flex items-stretch gap-2">
                <input
                  type="text"
                  value={studentLink}
                  readOnly
                  onFocus={(e) => e.target.select()}
                  className="flex-1 min-w-0 bg-white border-2 border-emerald-200 rounded-xl px-3 py-2 text-[11px] font-medium text-slate-700 focus:outline-none focus:border-emerald-400 break-all"
                />
                <button
                  onClick={copyStudentLink}
                  className={`flex items-center justify-center gap-1 px-3 rounded-xl text-xs font-black whitespace-nowrap transition-all active:scale-95 shadow-sm ${
                    copied ? 'bg-emerald-600 text-white' : 'bg-emerald-500 text-white hover:bg-emerald-600'
                  }`}
                >
                  {copied ? <><Check size={14} /> 복사됨</> : <><Copy size={14} /> 복사</>}
                </button>
              </div>
              <div className="text-[10px] text-emerald-600 mt-2 leading-relaxed">
                ⚠️ 맨 주소가 아니라 <b>위 [복사] 링크를 그대로</b> 공유해야 다른 컴퓨터·태블릿에서도 명단이 보여요.
                학생이 이 링크로 들어오면 설정 화면 없이 바로 이름 선택으로 들어갑니다.
              </div>
            </div>
          )}

          <div className="flex items-center gap-2 mt-5">
            {canCancel && (
              <button
                onClick={onCancel}
                className="px-4 py-3 rounded-xl text-sm font-black bg-slate-100 text-slate-500 hover:bg-slate-200 active:scale-95 transition-all"
              >
                취소
              </button>
            )}
            <button
              onClick={() => valid && onSave(trimmed)}
              disabled={!valid}
              className={`flex-1 py-3 rounded-xl text-sm font-black flex items-center justify-center gap-2 transition-all shadow-md active:scale-95 ${
                valid
                  ? 'bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-lg'
                  : 'bg-slate-200 text-slate-400 cursor-not-allowed'
              }`}
            >
              <ArrowRightCircle size={18} /> 연결하기
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

// 선생님 설정 진입 전 비밀번호 확인 — 학생이 설정에 못 들어가게 막는다.
const PasscodeScreen = ({ onUnlock, onCancel }) => {
  const [code, setCode] = useState('');
  const [error, setError] = useState(false);

  const submit = () => {
    if (code === TEACHER_PASSCODE) {
      setError(false);
      onUnlock();
    } else {
      setError(true);
      setCode('');
    }
  };

  return (
    <div className="fixed inset-0 z-[120] bg-gradient-to-br from-slate-100 via-white to-indigo-50 flex flex-col p-4 sm:p-6 overflow-y-auto">
      <div className="max-w-sm mx-auto w-full flex flex-col flex-1 justify-center">
        <div className="bg-white rounded-3xl border-2 border-indigo-300 shadow-xl p-6 sm:p-8 text-center">
          <div className="inline-flex items-center justify-center bg-indigo-100 rounded-full w-14 h-14 mb-3 text-2xl">🔒</div>
          <h1 className="text-xl font-black text-slate-800">선생님 확인</h1>
          <p className="text-xs sm:text-sm text-slate-500 mt-1.5 leading-relaxed">
            선생님 설정은 비밀번호가 필요해요.<br />비밀번호를 입력해 주세요.
          </p>

          <input
            type="password"
            inputMode="numeric"
            autoFocus
            value={code}
            onChange={(e) => { setCode(e.target.value); setError(false); }}
            onKeyDown={(e) => { if (e.key === 'Enter') submit(); }}
            placeholder="비밀번호"
            className={`w-full mt-5 text-center tracking-widest bg-white border-2 rounded-xl px-4 py-3 text-lg font-bold text-slate-800 focus:outline-none shadow-sm ${error ? 'border-red-300 focus:border-red-400' : 'border-slate-200 focus:border-indigo-400'}`}
          />
          {error && (
            <div className="text-[12px] text-red-500 mt-2 font-bold">비밀번호가 올바르지 않아요.</div>
          )}

          <div className="flex items-center gap-2 mt-5">
            <button
              onClick={onCancel}
              className="px-4 py-3 rounded-xl text-sm font-black bg-slate-100 text-slate-500 hover:bg-slate-200 active:scale-95 transition-all"
            >
              취소
            </button>
            <button
              onClick={submit}
              disabled={!code}
              className={`flex-1 py-3 rounded-xl text-sm font-black flex items-center justify-center gap-2 transition-all shadow-md active:scale-95 ${code ? 'bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-lg' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
            >
              확인
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

// [UPDATED] Cover Section Component - Compact Layout (No Scroll)
const StudentSelectionScreen = ({ configured, students, loading, error, onRetry, onSelect, onOpenSettings }) => {
  const teamList = Array.from(new Set(students.map(s => s.team).filter(Boolean)));
  const hasTeams = teamList.length > 0;

  const [selectedTeam, setSelectedTeam] = useState('');
  const [selectedName, setSelectedName] = useState('');
  const [manualName, setManualName] = useState('');

  // 명단 없이도(시트 연결이 안 돼도) 이름을 직접 입력해 바로 시작
  const startManual = () => onSelect({ id: '', name: manualName.trim() || '학생', team: '' });

  // 팀이 바뀌면 이름 선택 초기화
  useEffect(() => { setSelectedName(''); }, [selectedTeam]);

  const candidates = hasTeams && selectedTeam
    ? students.filter(s => s.team === selectedTeam)
    : (!hasTeams ? students : []);

  const canStart = !!selectedName && (!hasTeams || !!selectedTeam);

  const handleStart = () => {
    const student = students.find(s =>
      s.name === selectedName && (!hasTeams || s.team === selectedTeam)
    );
    if (student) onSelect(student);
  };

  const selectClass =
    "w-full bg-white border-2 border-slate-200 rounded-xl px-4 py-3 text-base font-bold text-slate-800 " +
    "focus:outline-none focus:border-indigo-400 shadow-sm appearance-none cursor-pointer " +
    "bg-no-repeat bg-[right_0.75rem_center] " +
    "bg-[url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>\")] " +
    "pr-10";

  return (
    <div className="fixed inset-0 z-[100] bg-gradient-to-br from-indigo-50 via-white to-blue-50 flex flex-col p-4 sm:p-6 overflow-y-auto">
      <div className="max-w-md mx-auto w-full flex flex-col flex-1 justify-center">
       <div className="bg-white rounded-3xl border-2 border-indigo-300 shadow-xl p-6 sm:p-8">
        <div className="text-center mb-6">
          <div className="inline-flex items-center justify-center bg-indigo-100 rounded-full p-3 mb-2">
            <BookOpenCheck className="text-indigo-600 w-7 h-7" />
          </div>
          <div className="text-[10px] sm:text-xs font-bold text-indigo-500 tracking-widest uppercase mb-1">

          </div>

            {students.length === 0 ? '이름을 입력해 주세요' : '이름을 선택해 주세요'}
          </h1>
          <p className="text-xs sm:text-sm text-slate-500 mt-1">
            {students.length === 0
              ? '이름을 입력하고 시작하세요.'
              : (hasTeams ? '팀을 먼저 고른 뒤 이름을 선택해요.' : '드롭다운에서 본인 이름을 선택해 시작합니다.')}

        </div>

        {loading && (

// Photo Editor
const PhotoEditor = ({ imageSrc, onSave, onCancel }) => {
  const bgCanvasRef = useRef(null);
  const drawingCanvasRef = useRef(null);
  const containerRef = useRef(null);
  
  const [displaySize, setDisplaySize] = useState({ w: 0, h: 0 });
  const [originalSize, setOriginalSize] = useState({ w: 0, h: 0 }); 

  const [isDrawing, setIsDrawing] = useState(false);
  const [tool, setTool] = useState('pen');
  const [color, setColor] = useState('#ff0000');
  const [lineWidth, setLineWidth] = useState(5);
  const [textInput, setTextInput] = useState('');
  const [selectedSticker, setSelectedSticker] = useState('⭐');
  
  const [cropRect, setCropRect] = useState(null); 
  const [isDraggingCrop, setIsDraggingCrop] = useState(false);
  const dragStartRef = useRef(null);

  const stickers = ["⭐", "❤️", "✅", "❌", "🔥", "💧", "🧪", "🦠", "🔬", "🔭", "📝", "💡", "❓", "❗", "1️⃣", "2️⃣", "3️⃣", "😊", "🤔", "👍", "👎"];

  useEffect(() => {
    const img = new Image();
    img.src = imageSrc;
    img.onload = () => {
      const maxRes = 1600;
      let w = img.width;
      let h = img.height;
      if (w > maxRes || h > maxRes) {
        const ratio = Math.min(maxRes / w, maxRes / h);
        w *= ratio;
        h *= ratio;
      }
      setOriginalSize({ w, h });

      const availableW = window.innerWidth * 0.9;
      const availableH = window.innerHeight * 0.65;
      
      const scale = Math.min(availableW / w, availableH / h, 1); 
      
      setDisplaySize({
        w: w * scale,
        h: h * scale
      });

      initCanvases(img, w, h);
    };
  }, []);

  const initCanvases = (img, w, h) => {
    const bgCanvas = bgCanvasRef.current;
    const drawingCanvas = drawingCanvasRef.current;
    if (!bgCanvas || !drawingCanvas) return;

    bgCanvas.width = w;
    bgCanvas.height = h;
    drawingCanvas.width = w;
    drawingCanvas.height = h;

    const ctx = bgCanvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
  };

  const getCanvasPos = (e) => {
    if (!drawingCanvasRef.current) return { x: 0, y: 0 };
    const rect = drawingCanvasRef.current.getBoundingClientRect();
    const scaleX = originalSize.w / rect.width;
    const scaleY = originalSize.h / rect.height;
    
    const clientX = e.nativeEvent.touches ? e.nativeEvent.touches[0].clientX : e.nativeEvent.clientX;
    const clientY = e.nativeEvent.touches ? e.nativeEvent.touches[0].clientY : e.nativeEvent.clientY;

    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top) * scaleY
    };
  };

  const getDisplayPos = (e) => {
    if (!drawingCanvasRef.current) return { x: 0, y: 0 };
    const rect = drawingCanvasRef.current.getBoundingClientRect();
    const clientX = e.nativeEvent.touches ? e.nativeEvent.touches[0].clientX : e.nativeEvent.clientX;
    const clientY = e.nativeEvent.touches ? e.nativeEvent.touches[0].clientY : e.nativeEvent.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top
    };
  };

  const handleMouseDown = (e) => {
    if (tool === 'crop') {
      setIsDraggingCrop(true);
      const pos = getDisplayPos(e);
      dragStartRef.current = pos;
      setCropRect({ x: pos.x, y: pos.y, w: 0, h: 0 });
    } else if (tool === 'text') {
      if (!textInput.trim()) {
        alert("입력창에 글자를 먼저 적어주세요!");
        return;
      }
      const pos = getCanvasPos(e);
      const ctx = drawingCanvasRef.current.getContext('2d');
      const fontSize = lineWidth * 3 + 14; 
      
      ctx.font = `bold ${fontSize}px "Noto Sans KR", sans-serif`;
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      ctx.strokeStyle = 'white';
      ctx.lineWidth = Math.max(2, fontSize / 15);
      ctx.strokeText(textInput, pos.x, pos.y);
      ctx.fillText(textInput, pos.x, pos.y);
      
    } else if (tool === 'sticker') {
      if (!selectedSticker) return;
      const pos = getCanvasPos(e);
      const ctx = drawingCanvasRef.current.getContext('2d');
      const size = lineWidth * 5 + 20; 

      ctx.font = `${size}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(selectedSticker, pos.x, pos.y);

    } else {
      setIsDrawing(true);
      const pos = getCanvasPos(e);
      const ctx = drawingCanvasRef.current.getContext('2d');
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      if (tool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = lineWidth * 4;
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
      }
    }
  };

  const handleMouseMove = (e) => {
    if (tool === 'text' || tool === 'sticker') return;

    if (tool === 'crop') {
      if (!isDraggingCrop) return;
      const current = getDisplayPos(e);
      const start = dragStartRef.current;
      const w = current.x - start.x;
      const h = current.y - start.y;
      setCropRect({
        x: w > 0 ? start.x : current.x,
        y: h > 0 ? start.y : current.y,
        w: Math.abs(w),
        h: Math.abs(h)
      });
    } else {
      if (!isDrawing) return;
      const pos = getCanvasPos(e);
      const ctx = drawingCanvasRef.current.getContext('2d');
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }
  };

  const handleMouseUp = () => {
    if (tool === 'crop') setIsDraggingCrop(false);
    else {
      setIsDrawing(false);
      if (isDrawing && drawingCanvasRef.current) {
        drawingCanvasRef.current.getContext('2d').closePath();
      }
    }
  };

  const getMergedDataURL = () => {
    const bg = bgCanvasRef.current;
    const fg = drawingCanvasRef.current;
    const temp = document.createElement('canvas');
    temp.width = bg.width;
    temp.height = bg.height;
    const ctx = temp.getContext('2d');
    ctx.drawImage(bg, 0, 0);
    ctx.drawImage(fg, 0, 0);
    return temp.toDataURL('image/png');
  };

  const applyCrop = () => {
    if (!cropRect || cropRect.w < 5 || cropRect.h < 5) return;
    
    const scale = originalSize.w / displaySize.w;
    const sx = cropRect.x * scale;
    const sy = cropRect.y * scale;
    const sw = cropRect.w * scale;
    const sh = cropRect.h * scale;

    const merged = getMergedDataURL();
    const img = new Image();
    img.src = merged;
    img.onload = () => {
      const newW = sw;
      const newH = sh;
      
      setOriginalSize({ w: newW, h: newH });
      
      const availableW = window.innerWidth * 0.9;
      const availableH = window.innerHeight * 0.65;
      const newScale = Math.min(availableW / newW, availableH / newH, 1);
      setDisplaySize({ w: newW * newScale, h: newH * newScale });

      const bg = bgCanvasRef.current;
      const fg = drawingCanvasRef.current;
      bg.width = newW; bg.height = newH;
      fg.width = newW; fg.height = newH;
      
      const ctx = bg.getContext('2d');
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, newW, newH);
      
      fg.getContext('2d').clearRect(0, 0, newW, newH);
      
      setCropRect(null);
      setTool('pen');
    };
  };

  const handleRotate = () => {
    const merged = getMergedDataURL();
    const img = new Image();
    img.src = merged;
    img.onload = () => {
      const newW = img.height;
      const newH = img.width;
      
      setOriginalSize({ w: newW, h: newH });
      
      const availableW = window.innerWidth * 0.9;
      const availableH = window.innerHeight * 0.65;
      const newScale = Math.min(availableW / newW, availableH / newH, 1);
      setDisplaySize({ w: newW * newScale, h: newH * newScale });

      const bg = bgCanvasRef.current;
      const fg = drawingCanvasRef.current;
      bg.width = newW; bg.height = newH;
      fg.width = newW; fg.height = newH;

      const ctx = bg.getContext('2d');
      ctx.translate(newW/2, newH/2);
      ctx.rotate(90 * Math.PI / 180);
      ctx.drawImage(img, -img.width/2, -img.height/2);
      ctx.setTransform(1,0,0,1,0,0);

      fg.getContext('2d').clearRect(0, 0, newW, newH);
    };
  };

  const clearDrawing = () => {
    const drawingCanvas = drawingCanvasRef.current;
    if (drawingCanvas) {
      const ctx = drawingCanvas.getContext('2d');
      ctx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
    }
  };

  return (
    <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 animate-fade-in" style={{ position: 'fixed' }}>
      <div className="bg-white rounded-3xl w-full max-w-4xl overflow-hidden shadow-2xl flex flex-col h-[90vh]">
        {/* Header */}
        <div className="p-4 border-b flex justify-between items-center bg-slate-50 flex-shrink-0">
          <h3 className="font-bold text-slate-700 flex items-center gap-2">
            <Edit3 size={20} /> 사진 편집
          </h3>
          <button onClick={onCancel} className="p-2 hover:bg-slate-200 rounded-full transition-colors">
            <X size={24} className="text-slate-500" />
          </button>
        </div>

        {/* Canvas Area */}
        <div ref={containerRef} className="flex-1 bg-slate-900 flex items-center justify-center overflow-auto p-4 relative touch-none">
          <div 
            className="relative shadow-2xl bg-white"
            style={{ 
              width: displaySize.w, 
              height: displaySize.h,
              transition: 'width 0.3s, height 0.3s' 
            }}
          >
            <canvas ref={bgCanvasRef} className="absolute top-0 left-0 w-full h-full" />
            <canvas 
              ref={drawingCanvasRef} 
              className={`absolute top-0 left-0 w-full h-full ${tool === 'crop' ? 'cursor-crosshair' : (tool === 'text' || tool === 'sticker' ? 'cursor-pointer' : 'cursor-crosshair')}`}
              onMouseDown={handleMouseDown}
              onMouseMove={handleMouseMove}
              onMouseUp={handleMouseUp}
              onMouseLeave={handleMouseUp}
              onTouchStart={handleMouseDown}
              onTouchMove={handleMouseMove}
              onTouchEnd={handleMouseUp}
            />
            
            {/* Crop Box */}
            {cropRect && (
              <div 
                className="absolute border-2 border-white shadow-[0_0_0_9999px_rgba(0,0,0,0.5)] pointer-events-none"
                style={{
                  left: cropRect.x,
                  top: cropRect.y,
                  width: cropRect.w,
                  height: cropRect.h,
                }}
              >
                <div className="absolute inset-0 border border-black/30"></div>
              </div>
            )}
          </div>
          
          {/* Crop Apply Button */}
          {cropRect && cropRect.w > 10 && (
            <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-10">
              <button 
                onClick={applyCrop}
                className="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-indigo-700 animate-bounce-in"
              >
                자르기 적용
              </button>
            </div>
          )}
        </div>

        {/* Toolbar */}
        <div className="p-3 bg-white border-t flex flex-wrap gap-3 items-center justify-between flex-shrink-0">
          <div className="flex gap-2 items-center overflow-x-auto pb-1 sm:pb-0 scrollbar-hide">
            <div className="flex gap-1 p-1 bg-slate-100 rounded-lg flex-shrink-0">
               {/* Tools */}
               <button
                 onClick={() => { setTool('pen'); setCropRect(null); }}
                 className={`p-2 rounded-md transition-all ${tool === 'pen' ? 'bg-white shadow-sm text-indigo-600 ring-1 ring-indigo-100' : 'text-slate-500 hover:bg-slate-200'}`}
                 title="펜"
               >
                 <Pencil size={20} />
               </button>
               <button
                 onClick={() => { setTool('eraser'); setCropRect(null); }}
                 className={`p-2 rounded-md transition-all ${tool === 'eraser' ? 'bg-white shadow-sm text-indigo-600 ring-1 ring-indigo-100' : 'text-slate-500 hover:bg-slate-200'}`}
                 title="지우개"
               >
                 <Eraser size={20} />
               </button>
               <button
                 onClick={() => { setTool('text'); setCropRect(null); }}
                 className={`p-2 rounded-md transition-all ${tool === 'text' ? 'bg-white shadow-sm text-indigo-600 ring-1 ring-indigo-100' : 'text-slate-500 hover:bg-slate-200'}`}
                 title="글자 넣기"
               >
                 <Type size={20} />
               </button>
               <button
                 onClick={() => { setTool('sticker'); setCropRect(null); }}
                 className={`p-2 rounded-md transition-all ${tool === 'sticker' ? 'bg-white shadow-sm text-indigo-600 ring-1 ring-indigo-100' : 'text-slate-500 hover:bg-slate-200'}`}
                 title="스티커"
               >
                 <Smile size={20} />
               </button>
               <button
                 onClick={clearDrawing}
                 className="p-2 rounded-md transition-all text-slate-500 hover:bg-slate-200 hover:text-red-500"
                 title="모두 지우기"
               >
                 <Trash2 size={20} />
               </button>
               <button
                 onClick={() => { setTool('crop'); setCropRect(null); }}
                 className={`p-2 rounded-md transition-all ${tool === 'crop' ? 'bg-white shadow-sm text-indigo-600 ring-1 ring-indigo-100' : 'text-slate-500 hover:bg-slate-200'}`}
                 title="자르기"
               >
                 <Crop size={20} />
               </button>
            </div>

            <div className="w-px h-8 bg-slate-200 mx-1 flex-shrink-0"></div>

            {/* Tool Specific Options */}
            
            {/* 1. Text Input */}
            {tool === 'text' && (
              <div className="flex flex-col gap-1 flex-shrink-0 min-w-[120px]">
                <label className="text-[10px] font-bold text-indigo-500 uppercase flex items-center gap-1">
                  글자 내용
                </label>
                <input 
                  type="text"
                  value={textInput}
                  onChange={(e) => setTextInput(e.target.value)}
                  placeholder="내용 입력 후 사진 터치"
                  className="w-full text-sm border border-indigo-200 rounded-md p-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-indigo-50"
                />
              </div>
            )}
            
            {/* 2. Sticker Selector */}
            {tool === 'sticker' && (
              <div className="flex flex-col gap-1 flex-shrink-0 w-[150px]">
                <label className="text-[10px] font-bold text-indigo-500 uppercase flex items-center gap-1">
                  스티커 선택
                </label>
                <div className="flex gap-1 overflow-x-auto pb-1 scrollbar-hide">
                  {stickers.map(s => (
                    <button 
                      key={s}
                      onClick={() => setSelectedSticker(s)}
                      className={`text-xl p-1 rounded hover:bg-indigo-100 transition-colors ${selectedSticker === s ? 'bg-indigo-200' : ''}`}
                    >
                      {s}
                    </button>
                  ))}
                </div>
              </div>
            )}
            
            {(tool === 'text' || tool === 'sticker') && <div className="w-px h-8 bg-slate-200 mx-1 flex-shrink-0"></div>}

            {/* Color Picker (Hidden for Crop/Sticker) */}
            {tool !== 'crop' && tool !== 'sticker' && (
              <div className="flex flex-col gap-1 flex-shrink-0">
                <label className="text-[10px] font-bold text-slate-500 uppercase flex items-center gap-1">
                  <Palette size={10} /> 색상
                </label>
                <div className="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
                  <input 
                    type="color" 
                    value={color} 
                    onChange={(e) => setColor(e.target.value)} 
                    className="w-8 h-8 rounded-md cursor-pointer border-none bg-transparent p-0" 
                  />
                </div>
              </div>
            )}
            
            {tool !== 'crop' && tool !== 'sticker' && <div className="w-px h-8 bg-slate-200 mx-1 flex-shrink-0"></div>}

            {/* Size Slider */}
            {tool !== 'crop' && (
               <div className="flex flex-col gap-1 flex-shrink-0 min-w-[80px]">
                <label className="text-[10px] font-bold text-slate-500 uppercase">
                  {tool === 'text' ? '글자 크기' : (tool === 'sticker' ? '스티커 크기' : '펜 굵기')}
                </label>
                <input 
                  type="range" 
                  min="1" max="30" 
                  value={lineWidth} 
                  onChange={(e) => setLineWidth(e.target.value)} 
                  className="w-full accent-yellow-500 h-2 bg-yellow-200 rounded-lg appearance-none cursor-pointer"
                />
              </div>
            )}

            <div className="w-px h-8 bg-slate-200 mx-1 flex-shrink-0"></div>

            <button 
              onClick={handleRotate}
              className="flex flex-col items-center justify-center p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors min-w-[50px] flex-shrink-0"
            >
              <RotateCw size={20} />
              <span className="text-[10px] font-bold">회전</span>
            </button>
          </div>

          <button 
            onClick={() => onSave(getMergedDataURL())}
            className="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-md ml-auto flex-shrink-0"
          >
            <Check size={20} /> 완료
          </button>
        </div>
      </div>
    </div>
  );
};

// ----------------------------------------------------------------------
// 3. Module Components (Widgets)
// ----------------------------------------------------------------------

// [Module 1] Text Note
const TextModule = ({ content, onUpdate, placeholder }) => {
  return (
    <AutoResizeTextarea 
      value={content || ""}
      onChange={(e) => onUpdate(e.target.value)}
      className="w-full p-3 sm:p-4 border-2 border-slate-200 rounded-xl sm:rounded-2xl focus:ring-4 focus:ring-blue-200 focus:border-blue-400 focus:outline-none text-slate-700 text-base sm:text-lg leading-relaxed bg-white shadow-sm placeholder:text-slate-400"
      placeholder={placeholder || "탐구하면서 알게 된 것을 기록하세요."}
      minHeight="52px" 
    />
  );
};

// [Module 2] Plan
const PlanModule = ({ content, onUpdate }) => {
  const safeContent = content || { materials: "", steps: "" };

  const updateField = (field, value) => {
    onUpdate({ ...safeContent, [field]: value });
  };

  return (
    <div className="space-y-4 sm:space-y-6">
      <div className="bg-white p-4 sm:p-5 rounded-xl sm:rounded-2xl border-2 border-orange-200 shadow-sm">
        <h4 className="text-sm sm:text-base font-bold text-orange-600 mb-2 sm:mb-3 flex items-center gap-2">
          🧪 준비물 챙기기
        </h4>
        <AutoResizeTextarea 
          value={safeContent.materials}
          onChange={(e) => updateField('materials', e.target.value)}
          className="w-full p-3 border-2 border-orange-100 rounded-xl text-base focus:ring-2 focus:ring-orange-200 focus:border-orange-400 focus:outline-none bg-orange-50/30 placeholder:text-orange-300 text-slate-700"
          placeholder="예: 돋보기, 자, 줄자, 색연필, 관찰 공책"
          minHeight="50px"
        />
      </div>

      <div>
        <h4 className="text-sm sm:text-base font-bold text-slate-700 mb-2 sm:mb-3">📝 탐구 순서</h4>
        <AutoResizeTextarea 
          value={safeContent.steps}
          onChange={(e) => updateField('steps', e.target.value)}
          className="w-full p-3 sm:p-4 border-2 border-slate-200 rounded-xl sm:rounded-2xl focus:ring-4 focus:ring-blue-200 focus:border-blue-400 focus:outline-none text-slate-700 leading-relaxed text-base sm:text-lg bg-white shadow-sm"
          placeholder="1. 강낭콩을 화분에 심고 날마다 살펴봅니다.&#13;&#10;2. 싹이 튼 날부터 줄기 길이를 자로 잽니다.&#13;&#10;3. 잎의 모양과 색깔을 그림과 글로 기록합니다."
          minHeight="52px"
        />
      </div>
    </div>
  );
};

// Unit Selector Component
const UnitSelector = ({ label, value, onChange }) => {
  const units = ['없음', 'cm', 'm', 'mm', 'km', 'g', 'kg', 'mL', 'L', '초', '분', '시간', '℃', '개', '명', '회', '기타'];
  const [isCustom, setIsCustom] = useState(!units.includes(value) && value !== '');

  const handleSelectChange = (e) => {
    const val = e.target.value;
    if (val === '기타') {
      setIsCustom(true);
      onChange(''); // Reset input for custom
    } else {
      setIsCustom(false);
      onChange(val === '없음' ? '' : val);
    }
  };

  return (
    <div className="flex flex-col gap-1 w-full">
      <label className="text-xs font-bold text-slate-500 flex items-center gap-1">
        {label} <span className="text-[10px] font-normal text-slate-400">(단위)</span>
      </label>
      <div className="flex gap-1">
        <div className="relative flex-1">
          <select 
            value={isCustom ? '기타' : (value || '없음')} 
            onChange={handleSelectChange}
            className="w-full p-1.5 text-xs sm:text-sm border border-slate-200 rounded-lg appearance-none bg-white focus:outline-none focus:ring-2 focus:ring-green-200 text-slate-700 font-bold"
          >
            {units.map(u => <option key={u} value={u}>{u}</option>)}
          </select>
          <div className="absolute right-2 top-1/2 transform -translate-y-1/2 pointer-events-none text-slate-400">
            <ChevronDown size={14} />
          </div>
        </div>
        {isCustom && (
          <input 
            type="text" 
            value={value} 
            onChange={(e) => onChange(e.target.value)}
            className="w-16 sm:w-20 p-1.5 text-xs sm:text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-200 text-slate-700"
            placeholder="직접입력"
            autoFocus
          />
        )}
      </div>
    </div>
  );
};

// [Module 3] Data Analysis — 3-4학년용
// — 항상 0부터 시작 (음수 차단), X/Y축 표시, 막대·꺾은선 토글 유지
const DataModule = ({ content, onUpdate }) => {
  const safeContent = content || {
    data: [{ label: '항목 1', value: 0 }, { label: '항목 2', value: 0 }, { label: '항목 3', value: 0 }],
    chartType: 'bar',
    xUnit: '',
    yUnit: ''
  };

  const setData = (newData) => onUpdate({ ...safeContent, data: newData });
  const setChartType = (newType) => onUpdate({ ...safeContent, chartType: newType });
  const setXUnit = (val) => onUpdate({ ...safeContent, xUnit: val });
  const setYUnit = (val) => onUpdate({ ...safeContent, yUnit: val });

  const handleChange = (index, field, val) => {
    const newData = [...safeContent.data];
    if (field === 'value') {
      const num = Number(val);
      newData[index][field] = isNaN(num) || num < 0 ? 0 : num;
    } else {
      newData[index][field] = val;
    }
    setData(newData);
  };

  const addRow = () => setData([...safeContent.data, { label: `항목 ${safeContent.data.length + 1}`, value: 0 }]);
  const removeRow = (index) => setData(safeContent.data.filter((_, i) => i !== index));

  // 막대·꺾은선 모두 0부터 시작
  const values = safeContent.data.map(d => Math.max(0, d.value));
  let maxVal = Math.max(...values, 0);
  if (maxVal === 0) maxVal = 10; // 모두 0일 때 보기 좋게

  return (
    <div className="flex flex-col lg:flex-row gap-6">
      <div className="flex-1 tool-btn">
        <div className="flex justify-between items-center mb-3">
          <h4 className="text-sm sm:text-base font-bold text-slate-700">📊 데이터 입력하기</h4>
          <div className="flex bg-slate-100 p-1 rounded-lg">
            <button
              onClick={() => setChartType('bar')}
              className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${safeContent.chartType === 'bar' ? 'bg-white text-green-600 shadow-sm' : 'text-slate-400'}`}
            >
              막대
            </button>
            <button
              onClick={() => setChartType('line')}
              className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${safeContent.chartType === 'line' ? 'bg-white text-green-600 shadow-sm' : 'text-slate-400'}`}
            >
              꺾은선
            </button>
          </div>
        </div>

        <div className="flex gap-2 mb-2 px-1">
          <UnitSelector label="항목(가로)" value={safeContent.xUnit || ''} onChange={setXUnit} />
          <UnitSelector label="변화량(세로)" value={safeContent.yUnit || ''} onChange={setYUnit} />
        </div>

        <div className="bg-slate-50 border-2 border-slate-100 rounded-xl sm:rounded-2xl p-3 max-h-60 overflow-y-auto">
          {safeContent.data.map((row, idx) => (
            <div key={idx} className="flex gap-2 mb-2 items-center">
              <input 
                type="text" 
                value={row.label}
                onChange={(e) => handleChange(idx, 'label', e.target.value)}
                className="flex-1 p-2 border border-slate-200 rounded-lg text-sm focus:border-green-400 focus:outline-none"
                placeholder="이름"
              />
              <input
                type="number"
                min="0"
                value={row.value}
                onChange={(e) => handleChange(idx, 'value', e.target.value)}
                className="w-16 sm:w-20 p-2 border border-slate-200 rounded-lg text-sm text-right focus:border-green-400 focus:outline-none"
                placeholder="0"
              />
              <button onClick={() => removeRow(idx)} className="text-slate-300 hover:text-red-500 p-1">
                <Trash2 size={16} />
              </button>
            </div>
          ))}
          <button 
            onClick={addRow}
            className="w-full py-2 border-2 border-dashed border-green-200 text-green-500 rounded-xl hover:bg-green-50 font-bold text-sm transition-colors mt-2"
          >
            + 항목 추가
          </button>
        </div>
      </div>

      <div className="flex-1 flex flex-col">
        <h4 className="text-sm sm:text-base font-bold text-slate-700 mb-3">📊 결과 (표 · 그래프)</h4>
        <div className="data-graph-capture bg-white border-2 border-slate-100 rounded-xl sm:rounded-2xl shadow-sm overflow-hidden p-3">

          {/* 표: 그래프 위에 항상 표시 */}
          <table className="w-full border-collapse text-sm sm:text-base mb-3">
            <thead>
              <tr>
                <th className="border-2 border-green-300 bg-green-50 text-green-700 font-bold p-1.5 sm:p-2 text-center">
                  항목{safeContent.xUnit ? ` (${safeContent.xUnit})` : ''}
                </th>
                <th className="border-2 border-green-300 bg-green-50 text-green-700 font-bold p-1.5 sm:p-2 text-center">
                  값{safeContent.yUnit ? ` (${safeContent.yUnit})` : ''}
                </th>
              </tr>
            </thead>
            <tbody>
              {safeContent.data.map((d, i) => (
                <tr key={i}>
                  <td className="border-2 border-slate-200 p-1.5 sm:p-2 text-center text-slate-700 font-medium break-all">
                    {d.label || '-'}
                  </td>
                  <td className="border-2 border-slate-200 p-1.5 sm:p-2 text-center text-slate-800 font-bold">
                    {d.value}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>

          {/* 그래프 */}
          <div className="relative h-64 sm:h-72 overflow-hidden">
          {/* Y축 단위 캡션 — 좌상단 */}
          <div className="absolute top-1.5 left-2 text-[10px] sm:text-xs font-bold text-slate-500 z-20">
            값{safeContent.yUnit ? ` (${safeContent.yUnit})` : ''}
          </div>
          {/* X축 단위 캡션 — 우하단 */}
          <div className="absolute bottom-1 right-2 text-[10px] sm:text-xs font-bold text-slate-500 z-20">
            항목{safeContent.xUnit ? ` (${safeContent.xUnit})` : ''}
          </div>

          <svg className="w-full h-full z-10">
            {/* 그래프 영역: x 14%~98%, y 14%~82% */}
            {/* 가운데 보조선 */}
            <line x1="14%" y1="48%" x2="98%" y2="48%" stroke="#e2e8f0" strokeWidth="1" strokeDasharray="3,3" />

            {/* Y축 (세로) */}
            <line x1="14%" y1="14%" x2="14%" y2="82%" stroke="#334155" strokeWidth="2" />
            {/* X축 (가로) */}
            <line x1="14%" y1="82%" x2="98%" y2="82%" stroke="#334155" strokeWidth="2" />

            {/* Y축 눈금 */}
            <line x1="11%" y1="14%" x2="14%" y2="14%" stroke="#334155" strokeWidth="2" />
            <line x1="11%" y1="48%" x2="14%" y2="48%" stroke="#334155" strokeWidth="1.5" />
            <line x1="11%" y1="82%" x2="14%" y2="82%" stroke="#334155" strokeWidth="2" />

            {/* Y축 값 */}
            <text x="10%" y="14%" dy="4" textAnchor="end" fontSize="12" fill="#334155" fontWeight="bold">{maxVal}</text>
            <text x="10%" y="48%" dy="4" textAnchor="end" fontSize="11" fill="#64748b">{Math.round(maxVal/2)}</text>
            <text x="10%" y="82%" dy="4" textAnchor="end" fontSize="12" fill="#334155" fontWeight="bold">0</text>

            {/* 막대 / 꺾은선 + 값 + X 라벨 */}
            <g>
              {safeContent.data.map((d, i) => {
                const N = safeContent.data.length;
                const slot = 84 / N;                                // X축 길이 84% (14%~98%)
                const barW = slot * 0.6;
                const barXPct = 14 + (i * slot) + (slot - barW) / 2;
                const centerXPct = 14 + (i + 0.5) * slot;

                const v = Math.max(0, d.value);
                // 그래프 영역 세로: 14% ~ 82% (높이 68%)
                const yTopPct = 14 + ((maxVal - v) / maxVal) * 68;
                const barHPct = 82 - yTopPct;

                const isBar = safeContent.chartType !== 'line';
                const labelX = isBar ? barXPct + barW/2 : centerXPct;

                // 꺾은선용 다음 점 좌표
                const nextV = i < N - 1 ? Math.max(0, safeContent.data[i+1].value) : null;
                const nextYTopPct = nextV != null ? 14 + ((maxVal - nextV) / maxVal) * 68 : null;
                const nextCenterXPct = i < N - 1 ? 14 + (i + 1.5) * slot : null;

                return (
                  <g key={i}>
                    {isBar ? (
                      <rect
                        x={`${barXPct}%`}
                        y={`${yTopPct}%`}
                        width={`${barW}%`}
                        height={`${barHPct}%`}
                        fill="#4ade80"
                        rx="2"
                      />
                    ) : (
                      <>
                        {i < N - 1 && (
                          <line
                            x1={`${centerXPct}%`}
                            y1={`${yTopPct}%`}
                            x2={`${nextCenterXPct}%`}
                            y2={`${nextYTopPct}%`}
                            stroke="#22c55e"
                            strokeWidth="3"
                            strokeLinecap="round"
                          />
                        )}
                        <circle
                          cx={`${centerXPct}%`}
                          cy={`${yTopPct}%`}
                          r="5"
                          fill="#16a34a"
                          stroke="white"
                          strokeWidth="2"
                        />
                      </>
                    )}

                    <text
                      x={`${labelX}%`}
                      y={`${yTopPct}%`}
                      dy="-4"
                      textAnchor="middle"
                      fill="#334155"
                      fontSize="12"
                      fontWeight="bold"
                    >
                      {v}
                    </text>

                    <text
                      x={`${labelX}%`}
                      y="82%"
                      dy="16"
                      textAnchor="middle"
                      fill="#334155"
                      fontSize="11"
                      fontWeight="bold"
                    >
                      {d.label}
                    </text>
                  </g>
                )
              })}
            </g>
          </svg>
          </div>

        </div>
      </div>
    </div>
  );
};

// [Module 4] Timer
const TimerModule = () => {
  const [time, setTime] = useState(0);
  const [isRunning, setIsRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    return () => clearInterval(intervalRef.current);
  }, []);

  const start = () => {
    if (!isRunning) {
      setIsRunning(true);
      intervalRef.current = setInterval(() => {
        setTime((prev) => prev + 10);
      }, 10);
    }
  };

  const stop = () => {
    setIsRunning(false);
    clearInterval(intervalRef.current);
  };

  const reset = () => {
    stop();
    setTime(0);
  };

  const formatTime = (ms) => {
    const minutes = Math.floor(ms / 60000);
    const seconds = Math.floor((ms % 60000) / 1000);
    const milliseconds = Math.floor((ms % 1000) / 10);
    return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${milliseconds.toString().padStart(2, '0')}`;
  };

  return (
    <div className="flex flex-col items-center justify-center py-2">
      <div className="text-4xl sm:text-6xl font-mono font-black text-slate-800 mb-4 sm:mb-6 bg-white border-4 border-slate-100 px-6 sm:px-10 py-4 sm:py-6 rounded-2xl sm:rounded-3xl shadow-sm tracking-wider">
        {formatTime(time)}
      </div>
      <div className="flex gap-2 sm:gap-4 tool-btn w-full justify-center">
        {!isRunning ? (
          <button onClick={start} className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 sm:px-8 py-3 sm:py-4 bg-green-500 text-white rounded-xl sm:rounded-2xl font-bold text-base sm:text-lg hover:bg-green-600 transition-all shadow-lg active:scale-95">
            <Play size={20} className="sm:w-7 sm:h-7" fill="white" /> 시작
          </button>
        ) : (
          <button onClick={stop} className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 sm:px-8 py-3 sm:py-4 bg-orange-500 text-white rounded-xl sm:rounded-2xl font-bold text-base sm:text-lg hover:bg-orange-600 transition-all shadow-lg active:scale-95">
            <Pause size={20} className="sm:w-7 sm:h-7" fill="white" /> 멈춤
          </button>
        )}
        <button onClick={reset} className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 sm:px-8 py-3 sm:py-4 bg-slate-200 text-slate-600 rounded-xl sm:rounded-2xl font-bold text-base sm:text-lg hover:bg-slate-300 transition-all shadow-md active:scale-95">
          <RotateCcw size={20} className="sm:w-7 sm:h-7" /> 리셋
        </button>
      </div>
    </div>
  );
};

// [Module 5] Drawing
const DrawingModule = ({ content, onUpdate }) => {
  const canvasRef = useRef(null);
  const [isDrawing, setIsDrawing] = useState(false);
  const [color, setColor] = useState("#000000");
  const [lineWidth, setLineWidth] = useState(5);
  const [tool, setTool] = useState('pen'); 

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;

    // CSS 표시 크기에 맞춰 캔버스 내부 해상도 설정 (좌표 어긋남 방지)
    const setupCanvasSize = () => {
      const rect = canvas.getBoundingClientRect();
      const w = Math.max(1, Math.round(rect.width));
      const h = Math.max(1, Math.round(rect.height));
      let prev = null;
      try {
        if (canvas.width > 0 && canvas.height > 0) {
          prev = canvas.toDataURL('image/png');
        }
      } catch (e) {}
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);
      if (prev) {
        const img = new Image();
        img.src = prev;
        img.onload = () => ctx.drawImage(img, 0, 0, w, h);
      } else if (content) {
        const img = new Image();
        img.src = content;
        img.onload = () => ctx.drawImage(img, 0, 0, w, h);
      }
    };

    setupCanvasSize();
    window.addEventListener('resize', setupCanvasSize);
    return () => window.removeEventListener('resize', setupCanvasSize);
  }, []);

  const saveCanvas = () => {
    const canvas = canvasRef.current;
    if (canvas) {
      const dataUrl = canvas.toDataURL('image/png');
      onUpdate(dataUrl);
    }
  };

  const getPos = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    let clientX, clientY;
    if (e.nativeEvent.touches && e.nativeEvent.touches.length > 0) {
      clientX = e.nativeEvent.touches[0].clientX;
      clientY = e.nativeEvent.touches[0].clientY;
    } else {
      clientX = e.nativeEvent.clientX;
      clientY = e.nativeEvent.clientY;
    }
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top) * scaleY,
    };
  };

  const startDrawing = (e) => {
    setIsDrawing(true);
    const { x, y } = getPos(e);
    const ctx = canvasRef.current.getContext("2d");
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineCap = "round";
    
    if (tool === 'eraser') {
      ctx.strokeStyle = '#ffffff'; 
      ctx.lineWidth = lineWidth * 2;
    } else {
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
    }
  };

  const draw = (e) => {
    if (!isDrawing) return;
    const { x, y } = getPos(e);
    const ctx = canvasRef.current.getContext("2d");
    ctx.lineTo(x, y);
    ctx.stroke();
  };

  const stopDrawing = () => {
    setIsDrawing(false);
    saveCanvas();
  };

  const clearCanvas = () => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    saveCanvas();
  };

  return (
    <div className="flex flex-col gap-4">
      <div className="flex items-center justify-between bg-yellow-50 p-3 rounded-xl sm:rounded-2xl border-2 border-yellow-100 tool-btn flex-wrap gap-y-3">
        <div className="flex gap-3 sm:gap-4 items-center">
          
          <div className="flex bg-white rounded-lg sm:rounded-xl border border-yellow-200 overflow-hidden shadow-sm">
            <button 
              onClick={() => setTool('pen')}
              className={`p-2 transition-colors ${tool === 'pen' ? 'bg-yellow-200 text-yellow-800' : 'text-slate-400 hover:bg-yellow-50'}`}
              title="펜"
            >
              <Pencil size={18} className="sm:w-5 sm:h-5" />
            </button>
            <div className="w-px bg-yellow-200"></div>
            <button 
              onClick={() => setTool('eraser')}
              className={`p-2 transition-colors ${tool === 'eraser' ? 'bg-yellow-200 text-yellow-800' : 'text-slate-400 hover:bg-yellow-50'}`}
              title="지우개"
            >
              <Eraser size={18} className="sm:w-5 sm:h-5" />
            </button>
          </div>

          <div className="w-px h-8 sm:h-10 bg-yellow-200"></div>

          <div className={`flex flex-col gap-1 transition-opacity ${tool === 'eraser' ? 'opacity-50 pointer-events-none' : 'opacity-100'}`}>
            <label className="text-[10px] font-bold text-yellow-700 uppercase flex items-center gap-1">
              <Palette size={10} /> 색상
            </label>
            <div className="flex items-center gap-2 bg-white p-1 rounded-lg sm:rounded-xl border border-yellow-200 shadow-sm">
              <input 
                type="color" 
                value={color} 
                onChange={(e) => setColor(e.target.value)} 
                className="w-6 h-6 sm:w-8 sm:h-8 rounded-md sm:rounded-lg cursor-pointer border-none bg-transparent p-0" 
              />
            </div>
          </div>

          <div className="flex flex-col gap-1 min-w-[80px] sm:min-w-[100px]">
            <label className="text-[10px] font-bold text-yellow-700 uppercase">
              굵기
            </label>
            <input 
              type="range" 
              min="1" max="30" 
              value={lineWidth} 
              onChange={(e) => setLineWidth(e.target.value)} 
              className="w-full accent-yellow-500 h-2 bg-yellow-200 rounded-lg appearance-none cursor-pointer"
            />
          </div>
        </div>

        <button onClick={clearCanvas} className="flex items-center gap-1 text-xs font-bold text-orange-600 bg-white px-3 sm:px-4 py-2 rounded-lg sm:rounded-xl hover:bg-red-50 hover:text-red-600 border border-orange-100 shadow-sm transition-colors ml-auto sm:ml-0">
          <Trash2 size={16} /> <span className="hidden sm:inline">지우기</span>
        </button>
      </div>
      
      <div 
        className={`border-4 border-slate-100 rounded-xl sm:rounded-2xl overflow-hidden touch-none bg-white shadow-inner ${tool === 'eraser' ? 'cursor-cell' : 'cursor-crosshair'}`}
      >
        <canvas
          ref={canvasRef}
          onMouseDown={startDrawing}
          onMouseMove={draw}
          onMouseUp={stopDrawing}
          onMouseLeave={stopDrawing}
          onTouchStart={startDrawing}
          onTouchMove={draw}
          onTouchEnd={stopDrawing}
          className="w-full h-[250px] sm:h-[300px]" 
        />
      </div>
    </div>
  );
};

// [Module 6] Magnifier Module (돋보기 관찰)
const MagnifierModule = ({ content, onUpdate }) => {
  const images = (content || []).map(item =>
    typeof item === 'string' ? { src: item, caption: '' } : item
  );

  const [zoom, setZoom] = useState(1);
  const [isCameraOpen, setIsCameraOpen] = useState(true);
  const [cameraError, setCameraError] = useState(false);
  const videoRef = useRef(null);

  useEffect(() => {
    startCamera();
    return () => stopCamera();
  }, []);

  const startCamera = async () => {
    setCameraError(false);
    try {
      // 시작할 때 받아 둔 공유 스트림을 재사용 (권한 재요청 없음)
      const stream = await cameraManager.getStream();
      setIsCameraOpen(true);
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
      }
    } catch (e) {
      console.warn("Magnifier Camera Error:", e);
      setCameraError(true);
      setIsCameraOpen(true);
    }
  };

  const stopCamera = () => {
    // 공유 스트림은 멈추지 않고 비디오에서만 분리 (다음에 또 권한을 묻지 않도록)
    if (videoRef.current) videoRef.current.srcObject = null;
    setIsCameraOpen(false);
    setCameraError(false);
  };

  const captureZoomedPhoto = () => {
    if (videoRef.current) {
      const video = videoRef.current;
      const w = video.videoWidth;
      const h = video.videoHeight;

      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext('2d');

      const sW = w / zoom;
      const sH = h / zoom;
      const sX = (w - sW) / 2;
      const sY = (h - sH) / 2;

      ctx.drawImage(video, sX, sY, sW, sH, 0, 0, w, h);

      const imageUrl = canvas.toDataURL('image/png');
      onUpdate([...images, { src: imageUrl, caption: '' }]);
    }
  };

  const removeImage = (indexToRemove) => {
    onUpdate(images.filter((_, index) => index !== indexToRemove));
  };

  const updateCaption = (index, text) => {
    const newImages = [...images];
    newImages[index].caption = text;
    onUpdate(newImages);
  };

  return (
    <div className="flex flex-col gap-4">
      {/* 1. Live Magnifier View */}
      {isCameraOpen && (
        <div className="relative w-full bg-black rounded-2xl sm:rounded-3xl overflow-hidden flex flex-col items-center animate-fade-in border-4 border-pink-200 shadow-inner">

           {cameraError ? (
             <div className="w-full h-64 sm:h-80 flex flex-col items-center justify-center bg-slate-100 text-slate-500 gap-4 p-4 text-center">
               <AlertCircle size={48} className="text-red-400" />
               <p className="text-sm font-bold">카메라를 켤 수 없습니다.<br/>권한을 확인하고 다시 시도해주세요.</p>
               <button
                 onClick={startCamera}
                 className="px-4 py-2 bg-pink-500 text-white rounded-lg font-bold hover:bg-pink-600 transition-colors"
               >
                 다시 시도
               </button>
             </div>
           ) : (
             <div className="relative w-full h-64 sm:h-80 overflow-hidden bg-black">
               <video
                 ref={videoRef}
                 autoPlay
                 playsInline
                 muted
                 className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 min-w-full min-h-full object-cover transition-transform duration-100 ease-linear"
                 style={{ transform: `translate(-50%, -50%) scale(${zoom})` }}
               />
               <div className="absolute inset-0 pointer-events-none flex items-center justify-center opacity-30">
                  <div className="w-12 h-12 border-2 border-white rounded-full"></div>
                  <div className="w-1 h-1 bg-white rounded-full absolute"></div>
               </div>
             </div>
           )}

           {/* Controls */}
           {!cameraError && (
             <div className="w-full bg-slate-900/80 backdrop-blur-md p-4 flex flex-col gap-4 items-center">
               <div className="w-full max-w-xs flex items-center gap-3">
                  <span className="text-white font-bold text-xs">1x</span>
                  <input
                    type="range"
                    min="1"
                    max="5"
                    step="0.1"
                    value={zoom}
                    onChange={(e) => setZoom(parseFloat(e.target.value))}
                    className="w-full h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer accent-pink-500"
                  />
                  <span className="text-white font-bold text-xs">5x</span>
               </div>

               <div className="flex items-center gap-6">
                 <div className="text-white font-mono text-xl font-bold text-pink-400">
                   x{zoom.toFixed(1)}
                 </div>
                 <button
                  onClick={captureZoomedPhoto}
                  className="w-16 h-16 bg-white rounded-full border-4 border-pink-500 flex items-center justify-center hover:scale-105 active:scale-95 transition-transform shadow-[0_0_15px_rgba(236,72,153,0.5)]"
                 >
                   <div className="w-12 h-12 bg-slate-100 rounded-full border-2 border-slate-300"></div>
                 </button>
               </div>
             </div>
           )}
        </div>
      )}

      {!isCameraOpen && (
        <button onClick={startCamera} className="w-full py-8 bg-slate-100 rounded-2xl border-2 border-dashed border-pink-300 text-pink-500 font-bold flex flex-col items-center gap-2 hover:bg-pink-50 transition-colors">
          <Camera size={32} />
          <span>돋보기 카메라 다시 켜기</span>
        </button>
      )}

      {/* 2. Captured Images List */}
      {images.length > 0 && (
        <div className="space-y-3 mt-2">
           <h4 className="text-sm font-bold text-pink-600 flex items-center gap-2">
             <ListChecks size={16} /> 관찰 기록
           </h4>
           <div className="grid grid-cols-2 gap-3">
             {images.map((img, idx) => (
               <div key={idx} className="bg-white p-2 rounded-xl border border-pink-100 shadow-sm flex flex-col gap-2">
                 <div className="relative aspect-square rounded-lg overflow-hidden bg-slate-900">
                   <img src={img.src} className="w-full h-full object-cover" alt="Magnified" />
                   <button
                    onClick={() => removeImage(idx)}
                    className="absolute top-1 right-1 bg-black/50 text-white p-1 rounded-full hover:bg-red-500 transition-colors"
                   >
                     <X size={12} />
                   </button>
                 </div>
                 <input
                   type="text"
                   value={img.caption}
                   onChange={(e) => updateCaption(idx, e.target.value)}
                   className="w-full text-xs p-1.5 border border-pink-100 rounded bg-pink-50/30 focus:bg-white focus:border-pink-300 focus:outline-none text-center"
                   placeholder="무엇을 관찰했나요?"
                 />
               </div>
             ))}
           </div>
        </div>
      )}
    </div>
  );
};

      return saved ? JSON.parse(saved) : defaultValue;
    } catch (e) {
      return defaultValue;
    }
  };

  const [blocks, setBlocks] = useState(() => getInitialState('sl_blocks', [

      title: '🔮 가설 설정',

  }, [blocks]);

    localStorage.setItem('sl_cover', JSON.stringify(cover));
  }, [cover]);

  }, [isStarted]);

      },
